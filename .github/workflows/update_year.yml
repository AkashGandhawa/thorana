name: "Auto-Update Year in the Codebase on First Day of Each Year"

on:
  schedule:
    - cron: '0 0 1 1 *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab for testing

jobs:
  update-codebase-year:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential permission to allow GitHub Actions to push changes

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history to avoid shallow update errors

      - name: Run Script to Dynamically Replace Years
        run: |
          # Dynamically compute the current year and the previous year
          CURRENT_YEAR=$(date +'%Y')
          PREVIOUS_YEAR=$((CURRENT_YEAR - 1))
          
          echo "System Date reports current year as: $CURRENT_YEAR"
          echo "Targeting old string instances of: $PREVIOUS_YEAR"
          
          # Search and replace occurrences across specific project source files
          # This syntax targets standard text, HTML, JS, CSS, and Markdown configs
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.md" -o -name "LICENSE" \) \
          -not -path '*/.*' -exec sed -i "s/$PREVIOUS_YEAR/$CURRENT_YEAR/g" {} +

      - name: Check for Code Base Alterations
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes Directly to Branch
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          CURRENT_YEAR=$(date +'%Y')
          git add .
          git commit -m "chore: automated systems update codebase timeline to $CURRENT_YEAR"
          git push
